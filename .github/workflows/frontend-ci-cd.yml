name: Frontend CI/CD

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show CI context
        run: |
          echo "[CI TEST] Frontend CI started"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Build Docker image
        run: docker build -t fish-frontend:${{ github.sha }} .

  deploy:
    name: Deploy Frontend
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            echo "[CI TEST] Frontend deploy started on VPS"
            echo "[CI TEST] Branch: ${{ github.ref_name }}"
            echo "[CI TEST] Commit: ${{ github.sha }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            cd frontend
            docker compose up -d --build
            echo "[CI TEST] Frontend deploy finished"
